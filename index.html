 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Did Get SPHERE</title>
  <style>
    body {
      margin: 0;
      background-color: #000000;
      padding: 0;
      font-family: Arial, sans-serif;
      color: #EEEEEE;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 0;
      text-align: center;
      backdrop-filter: blur(2px);
    }
    .tab-container {
      display: flex;
      background-color: #000000;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      color: white;
      cursor: pointer;
      border-bottom: 15px solid transparent;
      transition: background-color 0.3s, border-bottom 0.3s;
    }
    .tab:hover {
      background-color: #000000;
    }
    .tab.active {
      border-bottom: 15px solid #909090;
      background-color: #000000;
    }
    .content {
      padding: 15px;
      display: none;
    }
    .content.active {
      display: block;
      padding: 0;
    }
    .logoContainer {
      position: relative;
    }
    .logo {
       position: relative;
       left: 50%;
       transform: translateX(-50%);
       max-width: 120vw;   /* scales to 80% of the viewport width */
       height: auto;      /* keeps proportions */
       display: block;
    }

    .spacer {
      margin-bottom: 20px;
    }
    .spacer2 {
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <div class="tab-container">
    <div class="tab active" onclick="showTab('home')">Home</div>
    <div class="tab" onclick="showTab('google')">Google Play</div>
  </div>
  <div class="spacer"></div>
  <div class="logoContainer">
    <img src="logo_website.png" class="logo">
  </div>
  <div id="home" class="content active">
    <p>Welcome to Did Get SPHERE.</p>
    <div class="spacer2"></div>
    <p>We provide iOS/Android services, specialized in server communication between e.g. merchant and market.</p>
<div class="spacer2"></div>
<div class="spacer2"></div>
    <p>Contact:</p>
    <a href="mailto:developer@didgetsphere.com" style="color: lightgray;">developer@didgetsphere.com</a>
<div class="spacer2"></div>
<div id="donate-box" style="margin-top:40px;">
  <h3>Donate:</h3>

  <label>Amount (NOK):</label>
  <input id="amount" 
       type="number" 
       min="1" 
       value="50"
       style="padding:5px; width:60px; box-sizing:border-box;">

  <div id="card-element" style="margin-top:15px;"></div>

  <button id="donate-button" style="margin-top:20px;padding:10px 20px;">
    Donate
  </button>

  <p id="donate-status" style="margin-top:15px;color:lightgray;"></p>
</div>

</div>
  <div id="google" class="content">
<div class="spacer"></div><a href="https://play.google.com/store/apps/details?id=com.didgetbit.randomnumbergenerator&pcampaignid=web_share" 
   target="_blank" 
   style="color: lightgray;">
   Random Number Generator
</a></p>
  </div>

  <script>
    function showTab(tabId) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.content');

      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }
  </script>

 <script src="https://js.stripe.com/v3/"></script>
<script>
  const stripe = Stripe("pk_live_51T9Ph9F7bXgQogmGTSCm4ZWuJvOB2jnUSHMlx9ZYwsE4dntatjPn0sGnVg5elRuEJoQENleGSY2Wc3167Ox62niE007zzz5duB"); // pk_live_xxx
  const elements = stripe.elements();
  const card = elements.create("card", {
  style: {
    base: {
      color: "lightgray",
      fontSize: "16px",
      "::placeholder": {
        color: "gray"
      }
    },
    invalid: {
      color: "#ff6b6b"
    }
  }
});
  card.mount("#card-element");

  document.getElementById("donate-button").addEventListener("click", async () => {
    const amount = document.getElementById("amount").value;
    const status = document.getElementById("donate-status");
    status.textContent = "Processing...";

    // 1) Lag Payment Intent på serveren
    const res = await fetch("https://didgetsphere.onrender.com/create-payment-intent", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: amount * 100 }) // NOK → øre
    });

    const data = await res.json();

    // 2) Fullfør betaling med Stripe Elements
    const result = await stripe.confirmCardPayment(data.clientSecret, {
      payment_method: {
        card: card
      }
    });

    if (result.error) {
      status.textContent = "Error: " + result.error.message;
    } else {
      if (result.paymentIntent.status === "succeeded") {
        status.textContent = "Thank you for your donation!";
      }
    }
  });
</script>

</body>
</html>
