<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DidgetSphere</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('https://didgetdev.github.io/background_website.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 40px;
      text-align: center;
      backdrop-filter: blur(2px);
    }
    .tab-container {
      display: flex;
      background-color: #000000;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      color: white;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: background-color 0.3s, border-bottom 0.3s;
    }
    .tab:hover {
      background-color: #000000;
    }
    .tab.active {
      border-bottom: 3px solid #909090;
      background-color: #000000;
    }
    .content {
      padding: 20px;
      display: none;
    }
    .content.active {
      display: block;
    }
  </style>
</head>
<body>

  <div class="tab-container">
    <div class="tab active" onclick="showTab('home')">Home</div>
    <div class="tab" onclick="showTab('google')">Google Play</div>
  </div>

  <div id="home" class="content active">
    <h1>DidgetSphere</h1>
    <p>Welcome to DidgetSphere. This website is under construction.</p>
  </div>

  <div id="google" class="content">
    <h1>Google Play</h1>
    <p>Check out our apps:</p>
    <p><a href="https://play.google.com/store/apps/details?id=com.didgetbit.randomnumbergenerator&pcampaignid=web_share" 
   target="_blank" 
   style="color: lightgray;">
   Random Number Generator
</a></p>
  </div>

  <script>
    function showTab(tabId) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.content');

      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }
  </script>

</body>
</html>
