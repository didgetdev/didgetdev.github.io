<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIDGETSPHERE</title>
  <style>
    body {
      margin: 0;
      background-color: #000000;
      padding: 0;
      font-family: Arial, sans-serif;
      color: #EEEEEE;
    }

    .content {
      position: relative;
      z-index: 1;
      padding: 0;
      text-align: center;
      backdrop-filter: blur(2px);
    }
    .tab-container {
      display: flex;
      background-color: #000000;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      color: white;
      cursor: pointer;
      border-bottom: 15px solid transparent;
      transition: background-color 0.3s, border-bottom 0.3s;
    }
    .tab:hover {
      background-color: #000000;
    }
    .tab.active {
      border-bottom: 15px solid #909090;
      background-color: #000000;
    }
    .content {
      padding: 0px;
      display: none;
    }
    .content.active {
      display: block;
      padding: 0;
    }
    .logoContainer {
      position: relative;
    }
    .logo {
       position: relative;
       left: 50%;
       transform: translateX(-50%);
    }
    .spacer {
      margin-bottom: 140px;
    }
    .spacer2 {
      margin-bottom: 140px;
    }
  </style>
</head>
<body>

  <div class="tab-container">
    <div class="tab active" onclick="showTab('home')">Home</div>
    <div class="tab" onclick="showTab('google')">Google Play</div>
  </div>

  <div class="logoContainer">
    <img src="logo_website.png" class="logo">
  </div>

  <div id="home" class="content active">
    <p>Welcome to DIDGETSPHERE. (This website is under construction)</p> 
    <p>We provide iOS/Android services. Contact: developer@didgetsphere.com</p>
  </div>
  <div id="google" class="content">
    <p><a href="https://play.google.com/store/apps/details?id=com.didgetbit.randomnumbergenerator&pcampaignid=web_share" 
   target="_blank" 
   style="color: lightgray;">
   Random Number Generator
</a></p>
  </div>

  <script>
    function showTab(tabId) {
      const tabs = document.querySelectorAll('.tab');
      const contents = document.querySelectorAll('.content');

      tabs.forEach(tab => tab.classList.remove('active'));
      contents.forEach(content => content.classList.remove('active'));

      document.querySelector(`.tab[onclick="showTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }
  </script>

</body>
</html>
